<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wheel of Names</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0e17;
    --surface: #1a1929;
    --surface2: #252440;
    --accent: #ff6b6b;
    --accent2: #ffd93d;
    --accent3: #6bcb77;
    --text: #fffffe;
    --text-muted: #a7a9be;
    --radius: 12px;
    --wheel-size: min(360px, calc(100vw - 36px));
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
    gap: 28px;
    overflow-x: hidden;
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    letter-spacing: 1px;
    background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
  }

  .layout {
    display: flex;
    gap: 28px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 900px;
  }

  /* ─── WHEEL AREA ─────────────────────────── */
  .wheel-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
  }

  .wheel-stage {
    position: relative;
    width: var(--wheel-size);
    height: var(--wheel-size);
  }

  #wheelCanvas {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    display: block;
    filter: drop-shadow(0 8px 32px rgba(0,0,0,0.6));
  }

  /* pointer */
  .pointer {
    position: absolute;
    top: 50%;
    right: -18px;
    transform: translateY(-50%);
    width: 0;
    height: 0;
    border-top: 16px solid transparent;
    border-bottom: 16px solid transparent;
    border-right: 36px solid var(--accent);
    filter: drop-shadow(0 2px 6px rgba(255,107,107,0.7));
    z-index: 10;
  }

  /* center image overlay */
  #centerImgOverlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100px;
    height: 100px;
    border-radius: 50%;
    object-fit: contain;
    display: none;
    pointer-events: none;
    z-index: 5;
  }

  .spin-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    letter-spacing: 1px;
    background: linear-gradient(135deg, var(--accent), #ff9a3c);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 14px 48px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(255,107,107,0.4);
    transition: transform .12s, box-shadow .12s;
  }
  .spin-btn:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 6px 28px rgba(255,107,107,0.55); }
  .spin-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

  .wheel-actions {
    display: flex;
    gap: 10px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }

  .popup-btn {
    font-family: 'Nunito', sans-serif;
    font-size: .82rem;
    font-weight: 800;
    background: var(--surface2);
    color: var(--text);
    border: 1.5px solid #ffffff1f;
    border-radius: 999px;
    padding: 10px 14px;
    cursor: pointer;
    transition: border-color .15s, color .15s, transform .1s;
  }
  .popup-btn:hover {
    border-color: var(--accent2);
    color: var(--accent2);
    transform: translateY(-1px);
  }

  /* ─── WINNER BANNER ──────────────────────── */
  .winner-banner {
    font-family: 'Fredoka One', cursive;
    font-size: 1.15rem;
    background: linear-gradient(135deg, #ffd93d22, #ffd93d11);
    border: 1.5px solid #ffd93d55;
    color: var(--accent2);
    border-radius: var(--radius);
    padding: 12px 28px;
    text-align: center;
    min-width: 260px;
    min-height: 48px;
    opacity: 0;
    transition: opacity .4s;
  }
  .winner-banner.show { opacity: 1; }

  /* ─── PANEL ──────────────────────────────── */
  .panel {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    width: min(280px, 100%);
    border: 1px solid #ffffff10;
  }

  .panel-section { display: flex; flex-direction: column; gap: 10px; }

  .panel-label {
    font-size: .7rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  /* names list */
  .names-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 180px;
    overflow-y: auto;
    padding-right: 4px;
  }
  .names-list::-webkit-scrollbar { width: 4px; }
  .names-list::-webkit-scrollbar-track { background: transparent; }
  .names-list::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }

  .name-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border-radius: 8px;
    padding: 6px 10px;
    animation: slideIn .2s ease;
  }
  @keyframes slideIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:none; } }

  .name-row input[type="text"] {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: .9rem;
    font-weight: 600;
    outline: none;
  }
  .name-row input[type="text"]::placeholder { color: var(--text-muted); }

  .name-swatch {
    width: 18px; height: 18px;
    border-radius: 4px;
    border: 2px solid #ffffff20;
    flex-shrink: 0;
    cursor: pointer;
  }

  .remove-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color .15s, background .15s;
  }
  .remove-btn:hover { color: var(--accent); background: #ff6b6b20; }

  .add-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1.5px dashed #ffffff25;
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text-muted);
    font-family: 'Nunito', sans-serif;
    font-size: .85rem;
    font-weight: 700;
    cursor: pointer;
    transition: border-color .15s, color .15s;
    width: 100%;
  }
  .add-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  /* bucket */
  .bucket-wrap {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .bucket-textarea {
    width: 100%;
    min-height: 90px;
    background: var(--surface2);
    border: 1.5px solid #ffffff15;
    border-radius: 10px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: .85rem;
    font-weight: 600;
    padding: 10px 12px;
    resize: vertical;
    outline: none;
    transition: border-color .15s;
    line-height: 1.6;
  }
  .bucket-textarea::placeholder { color: var(--text-muted); }
  .bucket-textarea:focus { border-color: #ffffff35; }
  .bucket-actions {
    display: flex;
    gap: 8px;
  }
  .bucket-import-btn {
    flex: 1;
    font-family: 'Nunito', sans-serif;
    font-size: .82rem;
    font-weight: 800;
    background: linear-gradient(135deg, #6bcb77, #4d96ff);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 9px 12px;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
    letter-spacing: .3px;
  }
  .bucket-import-btn:hover { opacity: .88; transform: scale(1.02); }
  .bucket-clear-btn {
    font-family: 'Nunito', sans-serif;
    font-size: .82rem;
    font-weight: 700;
    background: var(--surface2);
    color: var(--text-muted);
    border: 1.5px solid #ffffff15;
    border-radius: 8px;
    padding: 9px 12px;
    cursor: pointer;
    transition: color .15s, border-color .15s;
  }
  .bucket-clear-btn:hover { color: var(--accent); border-color: var(--accent); }
  .bucket-hint {
    font-size: .68rem;
    color: var(--text-muted);
    line-height: 1.4;
  }

  /* global color palette */
  .palette-wrap {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .palette-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .palette-preset {
    display: flex;
    gap: 4px;
    padding: 6px 10px;
    border-radius: 8px;
    border: 1.5px solid transparent;
    cursor: pointer;
    transition: border-color .15s;
    background: var(--surface2);
  }
  .palette-preset:hover, .palette-preset.active { border-color: var(--accent2); }
  .palette-dot {
    width: 12px; height: 12px;
    border-radius: 3px;
  }
  .palette-preset span {
    font-size: .7rem;
    font-weight: 700;
    color: var(--text-muted);
    align-self: center;
    margin-left: 4px;
  }

  /* image upload */
  .upload-area {
    border: 1.5px dashed #ffffff25;
    border-radius: 10px;
    padding: 14px;
    text-align: center;
    cursor: pointer;
    transition: border-color .15s;
    position: relative;
    overflow: hidden;
  }
  .upload-area:hover { border-color: var(--accent3); }
  .upload-area input[type="file"] {
    display: none;
  }
  .upload-icon { font-size: 1.6rem; margin-bottom: 4px; }
  .upload-area p { font-size: .75rem; color: var(--text-muted); font-weight: 600; }
  .upload-preview {
    width: 100px; height: 100px;
    border-radius: 50%;
    object-fit: contain;
    margin: 0 auto 6px;
    display: none;
    border: none;
  }
  .clear-img-btn {
    background: none;
    border: none;
    color: var(--accent);
    font-size: .75rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 4px;
    display: none;
  }

  /* hidden color input helper */
  #hiddenColorPicker { display: none; }

  /* confetti canvas */
  #confettiCanvas {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 999;
  }

  body.popup-mode {
    padding: 14px;
    gap: 12px;
  }

  body.popup-mode > h1 {
    font-size: 1.4rem;
  }

  body.popup-mode .panel {
    display: flex;
    width: 300px;
  }

  body.popup-mode .layout {
    max-width: none;
    align-items: stretch;
    flex-wrap: nowrap;
  }

  body.popup-mode .wheel-stage {
    width: 560px;
    height: 560px;
  }

  body.popup-mode #wheelCanvas {
    width: 560px;
    height: 560px;
  }

  body.popup-mode .pointer {
    right: -22px;
    border-top-width: 18px;
    border-bottom-width: 18px;
    border-right-width: 40px;
  }

  body.popup-mode .popup-btn {
    display: none;
  }

  body.popup-mode .panel-section {
    display: none;
  }

  body.popup-mode .panel-section.names-popup-section {
    display: flex;
    flex: 1;
  }

  body.popup-mode .names-list {
    max-height: 560px;
  }

  @media (max-width: 420px) {
    body {
      padding-left: 10px;
      padding-right: 10px;
    }

    .pointer {
      right: -14px;
      border-top-width: 12px;
      border-bottom-width: 12px;
      border-right-width: 28px;
    }

    .panel {
      padding: 16px;
      width: 100%;
    }
  }
</style>
</head>
<body>

<canvas id="confettiCanvas"></canvas>
<h1>🎡 Wheel of Names</h1>

<div class="layout">

  <!-- WHEEL -->
  <div class="wheel-wrap">
    <div class="wheel-stage">
      <canvas id="wheelCanvas" width="360" height="360"></canvas>
      <div class="pointer"></div>
      <img id="centerImgOverlay" alt="center graphic">
    </div>
    <div class="wheel-actions">
      <button class="spin-btn" id="spinBtn">SPIN!</button>
      <button class="popup-btn" id="openPopupBtn">Open Pop-up Wheel</button>
    </div>
    <div class="winner-banner" id="winnerBanner">🎉 &nbsp;<span id="winnerName"></span>&nbsp; wins!</div>
  </div>

  <!-- PANEL -->
  <div class="panel">

    <!-- BUCKET -->
    <div class="panel-section">
      <div class="panel-label">📥 Name Bucket</div>
      <div class="bucket-wrap">
        <textarea class="bucket-textarea" id="bucketInput" placeholder="Paste names here&#10;one per line&#10;&#10;Alice&#10;Bob&#10;Carol&#10;…"></textarea>
        <div class="bucket-actions">
          <button class="bucket-import-btn" id="bucketImportBtn">⬆ Add to Wheel</button>
          <button class="bucket-clear-btn" id="bucketClearBtn">Clear All Names</button>
        </div>
        <div class="bucket-hint">One name per line. Imports append to existing names.</div>
      </div>
    </div>

    <!-- NAMES -->
    <div class="panel-section names-popup-section">
      <div class="panel-label">Names on Wheel</div>
      <div class="names-list" id="namesList"></div>
      <button class="add-btn" id="addNameBtn">＋ &nbsp;Add one name</button>
    </div>

    <!-- COLORS -->
    <div class="panel-section">
      <div class="panel-label">Color Palette</div>
      <div class="palette-wrap">
        <div class="palette-row" id="paletteRow"></div>
      </div>
    </div>

    <!-- CENTER IMAGE -->
    <div class="panel-section">
      <div class="panel-label">Center Graphic</div>
      <div class="upload-area" id="uploadArea">
        <input type="file" id="imgUpload" accept="image/*">
        <img class="upload-preview" id="uploadPreview">
        <div class="upload-icon">🖼️</div>
        <p>Click to upload image</p>
        <button class="clear-img-btn" id="clearImgBtn">✕ Remove</button>
      </div>
      <div class="bucket-hint">Recommended: 400×400px or larger, square aspect ratio works best.</div>
    </div>

  </div>
</div>

<input type="color" id="hiddenColorPicker">

<script>
// ─── STATE ─────────────────────────────────────────────────────────
const PRESETS = [
  { name:"Vivid",   colors:["#ff6b6b","#ffd93d","#6bcb77","#4d96ff","#ff922b","#cc5de8"] },
  { name:"Pastel",  colors:["#ffb3ba","#ffdfba","#ffffba","#baffc9","#bae1ff","#e8baff"] },
  { name:"Neon",    colors:["#f72585","#7209b7","#3a0ca3","#4361ee","#4cc9f0","#06d6a0"] },
  { name:"Earth",   colors:["#8b4513","#d2691e","#daa520","#6b8e23","#2e8b57","#4682b4"] },
];

let state = {
  entries: [
    { name:"Alice",   color:"#ff6b6b" },
    { name:"Bob",     color:"#ffd93d" },
    { name:"Carol",   color:"#6bcb77" },
    { name:"David",   color:"#4d96ff" },
    { name:"Eva",     color:"#ff922b" },
    { name:"Frank",   color:"#cc5de8" },
  ],
  activePalette: 0,
  centerImg: null,   // dataURL
  spinning: false,
  angle: 0,
};

// ─── ELEMENTS ──────────────────────────────────────────────────────
const canvas       = document.getElementById("wheelCanvas");
const ctx          = canvas.getContext("2d");
const spinBtn      = document.getElementById("spinBtn");
const openPopupBtn = document.getElementById("openPopupBtn");
const winnerBanner = document.getElementById("winnerBanner");
const winnerName   = document.getElementById("winnerName");
const namesList    = document.getElementById("namesList");
const addNameBtn   = document.getElementById("addNameBtn");
const paletteRow   = document.getElementById("paletteRow");
const uploadArea   = document.getElementById("uploadArea");
const imgUpload    = document.getElementById("imgUpload");
const uploadPreview= document.getElementById("uploadPreview");
const clearImgBtn  = document.getElementById("clearImgBtn");
const centerImg    = document.getElementById("centerImgOverlay");
const colorPicker  = document.getElementById("hiddenColorPicker");

let pendingColorIdx = null;
const isPopupMode = new URLSearchParams(window.location.search).get("popup") === "1";
const POPUP_STATE_KEY = "wheel-of-names-popup-state";

function savePopupState() {
  try {
    localStorage.setItem(POPUP_STATE_KEY, JSON.stringify(state));
  } catch (err) {
    // Ignore storage failures and keep normal behavior.
  }
}

function loadPopupState() {
  try {
    const raw = localStorage.getItem(POPUP_STATE_KEY);
    if (!raw) return;
    const parsed = JSON.parse(raw);
    if (!parsed || !Array.isArray(parsed.entries)) return;
    state.entries = parsed.entries;
    state.activePalette = Number.isInteger(parsed.activePalette) ? parsed.activePalette : state.activePalette;
    state.centerImg = parsed.centerImg || null;
    state.angle = typeof parsed.angle === "number" ? parsed.angle : 0;
  } catch (err) {
    // Ignore malformed state.
  }
}

function displayCenterImage() {
  // Display center image on the wheel canvas
  if (state.centerImg) {
    centerImg.src = state.centerImg;
    centerImg.style.display = "block";
  } else {
    centerImg.style.display = "none";
  }
  // In normal mode, also update the upload preview area
  if (!isPopupMode) {
    if (state.centerImg) {
      uploadPreview.src = state.centerImg;
      uploadPreview.style.display = "block";
      document.querySelector("#uploadArea .upload-icon").style.display = "none";
      clearImgBtn.style.display = "block";
    } else {
      uploadPreview.style.display = "none";
      uploadPreview.src = "";
      document.querySelector("#uploadArea .upload-icon").style.display = "block";
      clearImgBtn.style.display = "none";
    }
  }
}

if (isPopupMode) {
  document.body.classList.add("popup-mode");
  canvas.width = 560;
  canvas.height = 560;
  loadPopupState();
}

// ─── WHEEL DRAWING ─────────────────────────────────────────────────
function drawWheel(angle) {
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const r  = cx - 4;
  const entries = state.entries.length ? state.entries : [{ name:"Add names!", color:"#555" }];
  const slice = (2 * Math.PI) / entries.length;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  entries.forEach((entry, i) => {
    const start = angle + i * slice - Math.PI / 2;
    const end   = start + slice;

    // slice
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = entry.color;
    ctx.fill();

    // border
    ctx.strokeStyle = "rgba(0,0,0,0.18)";
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // label
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + slice / 2);
    ctx.textAlign = "right";
    ctx.fillStyle = getContrastColor(entry.color);
    const fontSize = Math.min(15, Math.max(9, 220 / entries.length));
    ctx.font = `700 ${fontSize}px 'Nunito', sans-serif`;
    ctx.shadowColor = "rgba(0,0,0,0.4)";
    ctx.shadowBlur = 3;
    const maxLen = r * 0.7;
    const txt = truncate(entry.name, ctx, maxLen);
    ctx.fillText(txt, r - 12, fontSize * 0.38);
    ctx.restore();
  });

  // outer ring
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, 2 * Math.PI);
  ctx.strokeStyle = "rgba(255,255,255,0.12)";
  ctx.lineWidth = 3;
  ctx.stroke();

  // center circle (always drawn; image overlaid via HTML)
  ctx.beginPath();
  ctx.arc(cx, cy, 50, 0, 2 * Math.PI);
  ctx.fillStyle = "#0f0e17";
  ctx.fill();
  ctx.strokeStyle = "rgba(255,255,255,0.18)";
  ctx.lineWidth = 2;
  ctx.stroke();
}

function truncate(text, ctx, maxPx) {
  if (ctx.measureText(text).width <= maxPx) return text;
  let t = text;
  while (t.length > 1 && ctx.measureText(t + "…").width > maxPx) t = t.slice(0, -1);
  return t + "…";
}

function getContrastColor(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return (r*0.299 + g*0.587 + b*0.114) > 150 ? "#1a1929" : "#ffffff";
}

// ─── SPIN ──────────────────────────────────────────────────────────
spinBtn.addEventListener("click", () => {
  if (state.spinning || state.entries.length < 2) return;
  state.spinning = true;
  spinBtn.disabled = true;
  winnerBanner.classList.remove("show");

  const extraSpins = 8 + Math.random() * 6;      // 8–14 full rotations
  const randomSlice = Math.random() * 2 * Math.PI;
  const totalAngle  = extraSpins * 2 * Math.PI + randomSlice;
  const duration    = 3800 + Math.random() * 1200; // 3.8–5s
  const start       = performance.now();
  const startAngle  = state.angle;

  function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

  function frame(now) {
    const elapsed = now - start;
    const t = Math.min(elapsed / duration, 1);
    state.angle = startAngle + totalAngle * easeOut(t);
    drawWheel(state.angle);

    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      state.spinning = false;
      spinBtn.disabled = false;
      announceWinner();
    }
  }
  requestAnimationFrame(frame);
});

openPopupBtn.addEventListener("click", () => {
  savePopupState();
  const popupUrl = new URL(window.location.href);
  popupUrl.searchParams.set("popup", "1");
  const popupWindow = window.open(
    popupUrl.toString(),
    "wheelPopupWindow",
    "popup=yes,width=940,height=900,resizable=yes,scrollbars=no,noopener,noreferrer"
  );

  if (!popupWindow) {
    winnerName.textContent = "Enable pop-ups to open the wheel window.";
    winnerBanner.classList.add("show");
  }
});

function announceWinner() {
  // pointer is on the RIGHT (3 o'clock = 0 rad). Wheel starts at -π/2.
  // The winning segment is the one under the pointer (angle 0 = right side).
  const entries = state.entries;
  const slice   = (2 * Math.PI) / entries.length;
  // normalize the angle so 0 rad = right, accounting for -π/2 start offset
  const normalized = ((-state.angle) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  const idx = Math.floor(normalized / slice) % entries.length;

  winnerName.textContent = entries[idx].name;
  winnerBanner.classList.add("show");
  launchConfetti(entries[idx].color);
}

// ─── BUCKET ────────────────────────────────────────────────────────
const bucketInput     = document.getElementById("bucketInput");
const bucketImportBtn = document.getElementById("bucketImportBtn");
const bucketClearBtn  = document.getElementById("bucketClearBtn");

bucketImportBtn.addEventListener("click", () => {
  const lines = bucketInput.value
    .split("\n")
    .map(l => l.trim())
    .filter(l => l.length > 0);

  if (!lines.length) return;

  const palette = PRESETS[state.activePalette].colors;
  lines.forEach(name => {
    const color = palette[state.entries.length % palette.length];
    state.entries.push({ name, color });
  });

  bucketInput.value = "";
  renderNames();
  drawWheel(state.angle);
  savePopupState();

  // quick flash feedback on button
  bucketImportBtn.textContent = `✓ Added ${lines.length}!`;
  bucketImportBtn.style.background = "linear-gradient(135deg,#ffd93d,#ff922b)";
  setTimeout(() => {
    bucketImportBtn.textContent = "⬆ Add to Wheel";
    bucketImportBtn.style.background = "";
  }, 1600);
});

bucketClearBtn.addEventListener("click", () => {
  bucketInput.value = "";
  state.entries = [];
  winnerBanner.classList.remove("show");
  renderNames();
  drawWheel(state.angle);
  savePopupState();
  bucketInput.focus();
});

// ─── NAMES PANEL ───────────────────────────────────────────────────
function renderNames() {
  namesList.innerHTML = "";
  state.entries.forEach((entry, i) => {
    const row = document.createElement("div");
    row.className = "name-row";

    const swatch = document.createElement("div");
    swatch.className = "name-swatch";
    swatch.style.background = entry.color;
    swatch.title = "Change color";
    swatch.addEventListener("click", () => {
      pendingColorIdx = i;
      colorPicker.value = entry.color;
      colorPicker.click();
    });

    const input = document.createElement("input");
    input.type = "text";
    input.value = entry.name;
    input.placeholder = "Name…";
    input.addEventListener("input", () => {
      state.entries[i].name = input.value;
      drawWheel(state.angle);
      savePopupState();
    });

    const rm = document.createElement("button");
    rm.className = "remove-btn";
    rm.innerHTML = "✕";
    rm.addEventListener("click", () => {
      state.entries.splice(i, 1);
      renderNames();
      drawWheel(state.angle);
      savePopupState();
    });

    row.append(swatch, input, rm);
    namesList.appendChild(row);
  });
}

addNameBtn.addEventListener("click", () => {
  const palette = PRESETS[state.activePalette].colors;
  const color   = palette[state.entries.length % palette.length];
  state.entries.push({ name: "", color });
  renderNames();
  drawWheel(state.angle);
  savePopupState();
  // focus last input
  const inputs = namesList.querySelectorAll("input");
  inputs[inputs.length - 1].focus();
});

// ─── COLOR PICKER ──────────────────────────────────────────────────
colorPicker.addEventListener("input", () => {
  if (pendingColorIdx !== null) {
    state.entries[pendingColorIdx].color = colorPicker.value;
    renderNames();
    drawWheel(state.angle);
    savePopupState();
  }
});
colorPicker.addEventListener("change", () => { pendingColorIdx = null; });

// ─── PALETTE PRESETS ───────────────────────────────────────────────
function renderPalette() {
  paletteRow.innerHTML = "";
  PRESETS.forEach((preset, pi) => {
    const btn = document.createElement("div");
    btn.className = "palette-preset" + (pi === state.activePalette ? " active" : "");
    preset.colors.slice(0, 4).forEach(c => {
      const dot = document.createElement("div");
      dot.className = "palette-dot";
      dot.style.background = c;
      btn.appendChild(dot);
    });
    const lbl = document.createElement("span");
    lbl.textContent = preset.name;
    btn.appendChild(lbl);
    btn.addEventListener("click", () => {
      state.activePalette = pi;
      applyPalette(pi);
      renderPalette();
    });
    paletteRow.appendChild(btn);
  });
}

function applyPalette(pi) {
  const colors = PRESETS[pi].colors;
  state.entries.forEach((entry, i) => {
    entry.color = colors[i % colors.length];
  });
  renderNames();
  drawWheel(state.angle);
  savePopupState();
}

const confCtx    = confCanvas.getContext("2d");
let confettiParts = [];

function launchConfetti(winColor) {
  confCanvas.width  = window.innerWidth;
  confCanvas.height = window.innerHeight;
  confettiParts = [];
  const colors = [winColor, "#ffd93d", "#fff", "#ff6b6b", "#6bcb77", "#4d96ff"];
  for (let i = 0; i < 140; i++) {
    confettiParts.push({
      x: Math.random() * confCanvas.width,
      y: -10 - Math.random() * 80,
      w: 6 + Math.random() * 8,
      h: 10 + Math.random() * 10,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: -2 + Math.random() * 4,
      vy: 3 + Math.random() * 5,
      angle: Math.random() * Math.PI * 2,
      spin: (-0.08 + Math.random() * 0.16),
      life: 1
    });
  }
  animateConfetti();
}

function animateConfetti() {
  confCtx.clearRect(0, 0, confCanvas.width, confCanvas.height);
  let alive = false;
  confettiParts.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.angle += p.spin;
    p.life -= 0.008;
    if (p.y < confCanvas.height + 20 && p.life > 0) alive = true;
    confCtx.save();
    confCtx.globalAlpha = Math.max(0, p.life);
    confCtx.translate(p.x, p.y);
    confCtx.rotate(p.angle);
    confCtx.fillStyle = p.color;
    confCtx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    confCtx.restore();
  });
  if (alive) requestAnimationFrame(animateConfetti);
  else confCtx.clearRect(0, 0, confCanvas.width, confCanvas.height);
}

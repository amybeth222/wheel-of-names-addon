<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wheel of Names</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <!-- Names Input Section -->
    <section class="section" id="names-section">
      <h2 class="section-title">Names</h2>
      <textarea
        id="names-input"
        class="names-textarea"
        placeholder="Enter names, one per line&#10;e.g.&#10;Alice&#10;Bob&#10;Carol"
        rows="6"
        aria-label="Enter names, one per line"
      ></textarea>
      <button id="load-names-btn" class="btn btn-primary" type="button">Load Names</button>
    </section>

    <!-- Wheel Canvas -->
    <section class="section wheel-section" aria-label="Wheel of Names">
      <div class="wheel-wrapper">
        <canvas id="wheel-canvas" width="300" height="300" aria-label="Spinning wheel"></canvas>
        <div class="wheel-pointer" aria-hidden="true">▼</div>
      </div>
      <button id="spin-btn" class="btn btn-spin" type="button" disabled>Spin!</button>
    </section>

    <!-- Winner Display -->
    <div id="winner-display" class="winner-display hidden" role="status" aria-live="polite">
      🎉 Winner: <span id="winner-name"></span>
    </div>

    <!-- Customization Section -->
    <section class="section" id="customize-section">
      <h2 class="section-title">Customize</h2>

      <div class="form-group">
        <label class="form-label">Wheel Colors</label>
        <div id="color-swatches" class="color-swatches">
          <!-- swatches rendered by JS -->
        </div>
        <button id="add-color-btn" class="btn btn-secondary" type="button">+ Add Color</button>
        <input type="color" id="color-picker" class="hidden" aria-label="Pick a color" />
      </div>

      <div class="form-group">
        <label class="form-label" for="center-image-input">Center Graphic</label>
        <div class="center-image-row">
          <input
            type="file"
            id="center-image-input"
            accept="image/*"
            class="hidden"
            aria-label="Upload center graphic"
          />
          <button id="upload-image-btn" class="btn btn-secondary" type="button">Upload Image</button>
          <button id="clear-image-btn" class="btn btn-secondary" type="button">Clear</button>
        </div>
        <div id="center-image-preview" class="center-image-preview hidden" aria-label="Center graphic preview"></div>
      </div>
    </section>
  </div>

  <script src="index.js"></script>
</body>
</html>
